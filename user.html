<!DOCTYPE html>
<html>

<head>
    <title id="pagetitle">Post</title>
    <script defer src="/layout.js"></script>
    <script src="/util.js"></script>
    <link rel="stylesheet" href="/app.css">
</head>

<body>
    <style>
        #username, #posts{
            margin-left: 3px;
        }

        #username{
            margin-bottom: 10px;
        }

        #post_title, #post_date{
            margin-top: 10px;
            margin-bottom: 10px;

            display: inline;
        }

        #post_body{
            margin-top: 10px;
            margin-left: 15px;
        }

        body{
            background-color: #f1f1f1;
        }

        #post{
            background-color: white;
            border-radius: 5px;

            padding: 5px;
            margin: 5px;
        }
    </style>
    <h1 id="username"></h1>
    <div style="display: flex; flex-direction: column;" id="posts"></div>
    <script defer>
        const username = window.location.pathname.split('/').at(-1);
        document.getElementById('username').innerText = username;
        fetch('/api/account/' + username, {
            method: "GET",
        }).then(resp => {
            if (resp.ok) {
                resp.json().then(json => {
                    const postsDiv = document.getElementById('posts');
                    json.forEach(post => {
                        const e = document.createElement('div');
                        e.id = post._id;
                        e.innerHTML = `
                            <div id="post"><h2 id="post_title"><a href="/posts/${post._id}">${post.title || "Untitled"}</a></h2>
                            <h3 id="post_date">- ${new Date(post.updated).toLocaleDateString('en-US')}</h3>
                            <p id="post_body">${post.content.replaceAll('\n', '<br>')}</p></div>`
                        postsDiv.appendChild(e);
                    });
                    if (json.length == 0) document.getElementById('posts').innerText = "This user has no posts.";
                })
            } else {
                document.getElementById('content').value = "An error occured. This user may not exist.";
                return;
            }
        });
    </script>
</body>
