<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <script defer src="/layout.js"></script>
    <link rel="stylesheet" href="/app.css">
</head>

<body>
    <style>
        #login_body{
            margin-left: 3px;
        }
    </style>
    <script>
        function login(e) {
            e.preventDefault();
            fetch('/api/login', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            }).then(resp => {
                if (resp.ok) { // success
                    resp.json().then(json => {
                        localStorage.setItem('username', json.username);
                        localStorage.setItem('token', json.token);
                        const params = new URLSearchParams(window.location.search);
                        window.location.href = decodeURIComponent(params.get('next'))
                    })
                } else { // bad login
                    document.getElementById('form').reset;
                    document.getElementById('error').innerText = "Invalid Username or Password"
                }
            })
        }
    </script>
    <div id="login_body">
        <h1>Login</h1>
        <form id="form" onsubmit="login(event)">
            <label for="username">Username: </label><input name="username" id="username" type="text" required /><br>
            <label for="password">Password: </label><input name="password" id="password" type="password" required /><br>
            <button type="submit">Login</button>
        </form>
        <p id="error" style="color: red;"></p>
        <a id="register" href="/register">Register Instead</a> 
    </div>
    <script>
        const a = document.getElementById("register");
        a.href = a.href + window.location.search;
    </script>
</body>

</html>
