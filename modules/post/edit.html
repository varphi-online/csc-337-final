<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <script defer src="/layout.js"></script>
    <script src="/util.js"></script>
    <link rel="stylesheet" href="/app.css">
</head>

<body>
    <script defer>
        const id = window.location.pathname.split('/').at(-1);
        fetch('/posts/' + id, {
            method: "GET",
            headers: {
                username: localStorage.getItem('username'),
                token: localStorage.getItem('token')
            },
        }).then(resp => {
            if (resp.ok) {
                resp.json().then(json => {
                    document.getElementById('title').value = json.title;
                    document.getElementById('content').value = json.content;
                    document.getElementById('draft').checked = !json.published
                })
            }
        });

        function save() {
            fetch('/posts/' + id, {
                method: "PATCH",
                headers: {
                    username: localStorage.getItem('username'),
                    token: localStorage.getItem('token'),
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    title: document.getElementById('title').value,
                    content: document.getElementById('content').value,
                    published: !document.getElementById('draft').checked
                })
            }).then(res => {
                if (!res.ok){
                    document.body.innerHTML += `<p style="color: red;">Something went wrong saving, please try again.</p>`
                }
                else { // short message
                    const p = document.createElement('p');
                    p.innerText = "saved";
                    p.style['color'] = 'green';
                    document.body.append(p);
                    setTimeout(()=>p.remove(),1200);
                };
            });
        }
    </script>
    <!-- TODO: Make a form for better ux -->
    <label for="title">Title: </label><input id="title" name="title" type="text"><br>
    <label for="content">Content: </label><textarea id="content" name="title" type="content"></textarea><br>
    <label for="draft">Draft</label><input type="checkbox" name="draft" id="draft"><br>
    <button onclick="save()">Save</button>
</body>
